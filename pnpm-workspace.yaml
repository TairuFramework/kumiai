packages:
  - packages/*
  - tests/*

allowBuilds:
  '@swc/core': true
  esbuild: false

nodeLinker: hoisted

catalog:
  '@noble/ciphers': ^2.1.1
  '@noble/curves': ^2.0.1
  '@noble/hashes': ^2.0.0
  'ts-mls': 2.0.0-rc.13
  'vitest': ^4.1.10
  '@enkaku/client': ^0.19.0
  '@enkaku/protocol': ^0.19.0
  '@enkaku/server': ^0.19.0
  '@enkaku/transport': ^0.19.1
  '@kokuin/capability': ^0.1.0
  '@kokuin/token': ^0.3.0
  '@sozai/async': ^0.2.1
  '@sozai/codec': ^0.2.0
  '@sozai/event': ^0.1.1
  '@sozai/log': ^0.2.0
  '@sozai/runtime': ^0.1.0
  '@sozai/schema': ^0.1.1
  '@sozai/stream': ^0.2.0
  '@kokuin/expo': ^0.3.0
  '@sozai/runtime-expo': ^0.2.1
  'expo': ^57.0.7
  'expo-status-bar': ^57.0.1
  'react': 19.2.3
  'react-native': ^0.86.0
  '@types/react': ^19.2.17
  'typescript': ^6.0.3

minimumReleaseAgeExclude:
  - '@enkaku/*'
  - '@kigu/*'
  - '@kokuin/*'
  - '@sozai/*'
  - '@expo/cli@57.0.2'
  - '@expo/fingerprint@0.20.1'
  - '@expo/inline-modules@0.1.1'
  - '@expo/local-build-cache-provider@57.0.1'
  - '@expo/metro-config@57.0.2'
  - '@expo/prebuild-config@57.0.2'
  - '@expo/router-server@57.0.1'
  - babel-preset-expo@57.0.1
  - expo-asset@57.0.2
  - expo-constants@57.0.2
  - expo-modules-autolinking@57.0.2
  - expo@57.0.0
