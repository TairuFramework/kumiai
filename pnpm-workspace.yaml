packages:
  - packages/*
  - tests/*

allowBuilds:
  '@swc/core': true
  esbuild: false

nodeLinker: hoisted

catalog:
  '@noble/ciphers': ^2.1.1
  '@noble/curves': ^2.0.1
  '@noble/hashes': ^2.0.0
  'ts-mls': 2.0.0-rc.13
  'vitest': ^4.1.9
  '@enkaku/client': ^0.18.0
  '@enkaku/protocol': ^0.18.0
  '@enkaku/server': ^0.18.0
  '@enkaku/transport': ^0.18.0
  '@kokuin/capability': ^0.1.0
  '@kokuin/token': ^0.1.0
  '@sozai/async': ^0.1.0
  '@sozai/codec': ^0.1.0
  '@sozai/event': ^0.1.0
  '@sozai/runtime': ^0.1.0
  '@sozai/schema': ^0.1.0
  '@sozai/stream': ^0.1.0
  '@kokuin/expo': ^0.1.0
  '@sozai/runtime-expo': ^0.1.0
  'expo': ^56.0.3
  'expo-status-bar': ^56.0.0
  'react': 19.2.3
  'react-native': ^0.85.3
  '@types/react': ^19.2.17
  'typescript': ^6.0.3

minimumReleaseAgeExclude:
  - '@enkaku/*'
  - '@kigu/*'
  - '@kokuin/*'
  - '@sozai/*'
  - '@expo/cli@56.1.10'
  - '@expo/fingerprint@0.19.1'
  - '@expo/prebuild-config@56.0.12'
  - '@expo/router-server@56.0.11'
  - babel-preset-expo@56.0.11
  - expo-asset@56.0.13
  - expo-constants@56.0.14
  - expo-modules-autolinking@56.0.11
  - expo-modules-core@56.0.12
  - expo@56.0.3
